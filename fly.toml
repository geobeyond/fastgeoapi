# fly.toml app configuration file generated for fastgeoapi on 2025-12-19T22:19:03+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fastgeoapi'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile.flyio"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# Persist the fastmcp OIDCProxy storage (DCR registrations + wrapped
# tokens, lives under ~/.local/share/fastmcp/oauth-proxy/) across image
# redeploys, so MCP clients authorize once instead of re-running the
# OAuth dance after every deploy. One-time after first mount:
#   fly ssh console -C "chown -R appuser:appuser /home/appuser/.local/share/fastmcp"
# (the volume is root-owned on first mount; ownership persists after).
[mounts]
  source = "fastmcp_oauth"
  destination = "/home/appuser/.local/share/fastmcp"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
